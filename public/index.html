<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ibiu-space</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
#login-screen { position: relative; z-index: 1; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 20px 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
#globe-container { width: 220px; height: 220px; margin-top: 5px; margin-bottom: 5px; flex-shrink: 0; }
#globe-container canvas { width: 100% !important; height: 100% !important; position: static !important; }
.brand { color: #fff; font-size: clamp(28px, 8vw, 42px); font-weight: 700; letter-spacing: 3px; text-align: center; text-transform: lowercase; margin-bottom: 4px; opacity: 0; animation: fadeInDown 0.8s ease forwards; }
@keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
.hero { text-align: center; margin-bottom: 6px; }
.hero h1 { color: #fff; font-size: clamp(14px, 3.5vw, 18px); font-weight: 400; letter-spacing: 1px; margin: 0; opacity: 0; animation: slideInRight 0.8s ease 0.6s forwards; }
.hero p { color: rgba(255,255,255,0.6); font-size: clamp(10px, 2.5vw, 13px); font-weight: 300; margin-top: 3px; opacity: 0; animation: slideInRight 0.8s ease 1.2s forwards; }
@keyframes slideInRight { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
.welcome-text { color: #d4af37; font-size: clamp(18px, 5vw, 26px); font-weight: 600; letter-spacing: 2px; text-align: center; margin-bottom: 12px; animation: goldPulse 2s ease-in-out infinite; }
@keyframes goldPulse { 0%,100% { text-shadow: 0 0 10px rgba(212,175,55,0.4); } 50% { text-shadow: 0 0 25px rgba(212,175,55,0.9); } }
.input-group { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.input-wrapper { position: relative; width: 100%; }
.input-wrapper .at-symbol { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #d4af37; font-size: 16px; z-index: 2; pointer-events: none; }
.input-wrapper input { width: 100%; padding: 14px 16px 14px 32px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #fff; font-size: 15px; outline: none; transition: all 0.3s; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
.input-wrapper input:focus { border-color: #d4af37; box-shadow: 0 0 20px rgba(212,175,55,0.2); background: rgba(255,255,255,0.08); }
.input-wrapper input::placeholder { color: rgba(255,255,255,0.35); }
.moon-btn { width: 70px; height: 70px; border-radius: 50%; border: none; background: radial-gradient(circle at 35% 35%, #f5f5dc, #d4af37, #8b6914); cursor: pointer; font-size: 11px; font-weight: 700; color: #1a1a1a; letter-spacing: 1px; box-shadow: 0 0 30px rgba(212,175,55,0.5), 0 0 60px rgba(212,175,55,0.2); transition: all 0.3s; position: relative; overflow: hidden; text-transform: uppercase; }
.moon-btn::after { content: ''; position: absolute; width: 12px; height: 12px; background: rgba(0,0,0,0.2); border-radius: 50%; top: 18px; right: 16px; }
.moon-btn:active { transform: scale(0.92); box-shadow: 0 0 50px rgba(212,175,55,0.8); }
.signup-link { color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 10px; cursor: pointer; transition: color 0.3s; }
.signup-link:hover { color: #d4af37; }
.error-msg { color: #ff4444; font-size: 12px; text-align: center; min-height: 18px; margin-top: 4px; }
.success-msg { color: #4caf50; font-size: 12px; text-align: center; min-height: 18px; margin-top: 4px; }
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
.modal-overlay.active { display: flex; }
.modal-box { background: #1a1a1e; border: 1px solid rgba(212,175,55,0.3); border-radius: 16px; padding: 30px 24px; width: 90%; max-width: 360px; text-align: center; position: relative; animation: modalIn 0.3s ease; }
@keyframes modalIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal-close { position: absolute; top: 12px; right: 16px; color: #fff; font-size: 22px; cursor: pointer; background: none; border: none; }
.modal-box h2 { color: #d4af37; font-size: 20px; margin-bottom: 16px; }
.modal-box .input-group { margin-bottom: 12px; }
.modal-box input { padding-left: 16px !important; }
.modal-box .moon-btn { margin: 0 auto; }
</style>
</head><body>

<canvas id="stars"></canvas>

<div id="login-screen">
  <div class="brand">ibiu-space</div>
  <div class="hero">
    <h1>Where Privacy Meets Simplicity</h1>
    <p>Private messaging designed for people who care about security</p>
  </div>
  <div id="globe-container"></div>
  <div class="welcome-text">Welcome</div>
  <div class="input-group">
    <div class="input-wrapper">
      <span class="at-symbol">@</span>
      <input type="text" id="usernameInput" class="at-input" placeholder="username" autocomplete="off">
    </div>
    <div class="input-wrapper">
      <input type="password" id="passwordInput" placeholder="Password">
    </div>
  </div>
  <button class="moon-btn" onclick="login()">Enter</button>
  <div class="error-msg" id="errorMsg"></div>
  <div class="signup-link" onclick="openSignup()">Don't have an account? Sign up</div>
</div>

<div class="modal-overlay" id="signupModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeSignup()">&times;</button>
    <h2>Create Account</h2>
    <div class="input-group">
      <div class="input-wrapper">
        <span class="at-symbol">@</span>
        <input type="text" id="signupUsername" class="at-input" placeholder="username" autocomplete="off">
      </div>
      <div class="input-wrapper">
        <input type="password" id="signupPassword" placeholder="Password">
      </div>
      <div class="input-wrapper">
        <input type="password" id="signupConfirm" placeholder="Confirm Password">
      </div>
    </div>
    <button class="moon-btn" onclick="register()" style="font-size:10px;">Sign Up</button>
    <div class="error-msg" id="signupError"></div>
    <div class="success-msg" id="signupSuccess"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
var socket = io();

// Stars background
(function() {
  var c = document.getElementById('stars');
  var ctx = c.getContext('2d');
  var stars = [];
  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for (var i = 0; i < 300; i++) {
    stars.push({ x: Math.random() * 2000, y: Math.random() * 2000, r: Math.random() * 1.2 + 0.3, a: Math.random(), s: Math.random() * 0.02 + 0.005 });
  }
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      s.a += s.s;
      var alpha = Math.sin(s.a) * 0.5 + 0.5;
      ctx.beginPath();
      ctx.arc(s.x % c.width, s.y % c.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
// Globe
(function() {
  var container = document.getElementById('globe-container');
  var c = document.createElement('canvas');
  c.width = 220; c.height = 220;
  container.appendChild(c);
  var ctx = c.getContext('2d');
  var dots = [];
  var angle = 0;
  for (var i = 0; i < 600; i++) {
    var lat = Math.asin(2 * Math.random() - 1);
    var lng = Math.random() * Math.PI * 2;
    dots.push({ lat: lat, lng: lng });
  }
  function drawGlobe() {
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.arc(110, 110, 100, 0, Math.PI * 2);
    ctx.fill();
    for (var i = 0; i < dots.length; i++) {
      var d = dots[i];
      var x = 110 + 100 * Math.cos(d.lat) * Math.cos(d.lng + angle);
      var y = 110 + 100 * Math.cos(d.lat) * Math.sin(d.lng + angle);
      var z = 100 * Math.sin(d.lat);
      if (Math.cos(d.lat) * Math.cos(d.lng + angle) > -0.1) {
        var alpha = 0.3 + 0.7 * (z + 100) / 200;
        ctx.fillStyle = 'rgba(212,175,55,' + alpha + ')';
        ctx.beginPath();
        ctx.arc(x, y, 1.4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    var grad = ctx.createRadialGradient(90, 90, 60, 110, 110, 110);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.5, 'rgba(0,0,0,0.15)');
    grad.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.beginPath();
    ctx.arc(110, 110, 100, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    angle += 0.004;
    requestAnimationFrame(drawGlobe);
  }
  drawGlobe();
})();

// Username handling
(function() {
  var loginInput = document.getElementById('usernameInput');
  var signupInput = document.getElementById('signupUsername');
  
  function handleAt(input) {
    input.addEventListener('keydown', function(e) {
      if (input.selectionStart === 0 && e.key === 'Backspace') {
        e.preventDefault();
      }
    });
    input.addEventListener('input', function() {
      if (!this.value.startsWith('@')) {
        this.value = '@' + this.value.replace(/@/g, '');
      }
    });
  }
  handleAt(loginInput);
  handleAt(signupInput);
  
  loginInput.value = '@';
  signupInput.value = '@';
})();

function login() {
  var u = document.getElementById('usernameInput').value.trim().replace('@','').toLowerCase();
  var p = document.getElementById('passwordInput').value.trim();
  if (!u || !p) {
    document.getElementById('errorMsg').textContent = 'All fields are required.';
    return;
  }
  socket.emit('login', { username: u, password: p });
}

function openSignup() {
  document.getElementById('signupModal').classList.add('active');
  document.getElementById('signupUsername').value = '@';
  document.getElementById('signupPassword').value = '';
  document.getElementById('signupConfirm').value = '';
  document.getElementById('signupError').textContent = '';
  document.getElementById('signupSuccess').textContent = '';
}

function closeSignup() {
  document.getElementById('signupModal').classList.remove('active');
}

function register() {
  var u = document.getElementById('signupUsername').value.trim().replace('@','').toLowerCase();
  var p = document.getElementById('signupPassword').value.trim();
  var c = document.getElementById('signupConfirm').value.trim();
  document.getElementById('signupError').textContent = '';
  document.getElementById('signupSuccess').textContent = '';
  if (!u || !p || !c) {
    document.getElementById('signupError').textContent = 'All fields are required.';
    return;
  }
  if (p !== c) {
    document.getElementById('signupError').textContent = 'Passwords do not match.';
    return;
  }
  socket.emit('register', { username: u, password: p });
}

socket.on('register-ok', function(msg) {
  document.getElementById('signupSuccess').textContent = msg;
  setTimeout(function() { closeSignup(); }, 1500);
});

socket.on('error-msg', function(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('signupError').textContent = msg;
});

socket.on('login-ok', function(data) {
  localStorage.setItem('ibiu_user', data.username);
  window.location.href = '/chat';
});
</script>
</body>
</html>
