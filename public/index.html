<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ibiu-space</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

#login-screen { position: relative; z-index: 1; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 20px 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

#globe-container { width: 180px; height: 180px; margin-top: 5px; margin-bottom: 5px; flex-shrink: 0; }
#globe-container canvas { width: 100% !important; height: 100% !important; position: static !important; }

.brand { color: #fff; font-size: clamp(28px, 8vw, 42px); font-weight: 700; letter-spacing: 3px; text-align: center; text-transform: lowercase; margin-bottom: 4px; opacity: 0; animation: fadeInDown 0.8s ease forwards; }
@keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

.hero { text-align: center; margin-bottom: 6px; }
.hero h1 { color: #fff; font-size: clamp(14px, 3.5vw, 18px); font-weight: 400; letter-spacing: 1px; margin: 0; opacity: 0; animation: slideInRight 0.8s ease 0.6s forwards; }
.hero p { color: rgba(255,255,255,0.6); font-size: clamp(10px, 2.5vw, 13px); font-weight: 300; margin-top: 3px; opacity: 0; animation: slideInRight 0.8s ease 1.2s forwards; }
@keyframes slideInRight { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }

.welcome-text { color: #d4af37; font-size: clamp(18px, 5vw, 26px); font-weight: 600; letter-spacing: 2px; text-align: center; margin-bottom: 12px; animation: goldPulse 2s ease-in-out infinite; }
@keyframes goldPulse { 0%,100% { text-shadow: 0 0 10px rgba(212,175,55,0.4); } 50% { text-shadow: 0 0 25px rgba(212,175,55,0.9); } }

.input-group { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.input-wrapper { position: relative; width: 100%; }
.input-wrapper input { width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #fff; font-size: 15px; outline: none; transition: all 0.3s; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
.input-wrapper input:focus { border-color: #d4af37; box-shadow: 0 0 20px rgba(212,175,55,0.2); background: rgba(255,255,255,0.08); }
.input-wrapper input::placeholder { color: rgba(255,255,255,0.35); }

.moon-btn { width: 70px; height: 70px; border-radius: 50%; border: none; background: radial-gradient(circle at 35% 35%, #f5f5dc, #d4af37, #8b6914); cursor: pointer; font-size: 11px; font-weight: 700; color: #1a1a1a; letter-spacing: 1px; box-shadow: 0 0 30px rgba(212,175,55,0.5), 0 0 60px rgba(212,175,55,0.2); transition: all 0.3s; position: relative; overflow: hidden; text-transform: uppercase; }
.moon-btn::after { content: ''; position: absolute; width: 12px; height: 12px; background: rgba(0,0,0,0.2); border-radius: 50%; top: 18px; right: 16px; }
.moon-btn:active { transform: scale(0.92); box-shadow: 0 0 50px rgba(212,175,55,0.8); }

.error-msg { color: #ff4444; font-size: 12px; text-align: center; min-height: 18px; margin-top: 4px; }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="globe"></canvas>

<div id="login-screen">
  <div class="brand">ibiu-space</div>
  <div class="hero">
    <h1>Where Privacy Meets Simplicity</h1>
    <p>Private messaging designed for people who care about security</p>
  </div>
  <div id="globe-container"></div>
  <div class="welcome-text">Welcome</div>
  <div class="input-group">
    <div class="input-wrapper"><input type="text" id="usernameInput" placeholder="@username" autocomplete="off"></div>
    <div class="input-wrapper"><input type="password" id="passwordInput" placeholder="Password"></div>
  </div>
  <button class="moon-btn" onclick="login()">Enter</button>
  <div class="error-msg" id="errorMsg"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
var socket = io();

// Stars background
(function() {
  var c = document.getElementById('stars');
  var ctx = c.getContext('2d');
  var stars = [];
  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for (var i = 0; i < 300; i++) {
    stars.push({ x: Math.random() * 2000, y: Math.random() * 2000, r: Math.random() * 1.2 + 0.3, a: Math.random(), s: Math.random() * 0.02 + 0.005 });
  }
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      s.a += s.s;
      var alpha = Math.sin(s.a) * 0.5 + 0.5;
      ctx.beginPath();
      ctx.arc(s.x % c.width, s.y % c.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

<script src="/socket.io/socket.io.js"></script>
<script>
var socket = io();

(function() {
  var c = document.getElementById('stars');
  var ctx = c.getContext('2d');
  var stars = [];
  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for (var i = 0; i < 300; i++) {
    stars.push({ x: Math.random() * 2000, y: Math.random() * 2000, r: Math.random() * 1.2 + 0.3, a: Math.random(), s: Math.random() * 0.02 + 0.005 });
  }
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      s.a += s.s;
      var alpha = Math.sin(s.a) * 0.5 + 0.5;
      ctx.beginPath();
      ctx.arc(s.x % c.width, s.y % c.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

(function() {
  var container = document.getElementById('globe-container');
  var c = document.createElement('canvas');
  c.width = 180; c.height = 180;
  container.appendChild(c);
  var ctx = c.getContext('2d');
  var dots = [];
  var angle = 0;
  for (var i = 0; i < 500; i++) {
    var lat = Math.asin(2 * Math.random() - 1);
    var lng = Math.random() * Math.PI * 2;
    dots.push({ lat: lat, lng: lng });
  }
  function drawGlobe() {
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.arc(90, 90, 78, 0, Math.PI * 2);
    ctx.fill();
    for (var i = 0; i < dots.length; i++) {
      var d = dots[i];
      var x = 90 + 78 * Math.cos(d.lat) * Math.cos(d.lng + angle);
      var y = 90 + 78 * Math.cos(d.lat) * Math.sin(d.lng + angle);
      var z = 78 * Math.sin(d.lat);
      if (Math.cos(d.lat) * Math.cos(d.lng + angle) > 0) {
        ctx.fillStyle = 'rgba(212,175,55,' + (0.4 + 0.6 * (z + 78) / 156) + ')';
        ctx.beginPath();
        ctx.arc(x, y, 1.3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    var grad = ctx.createRadialGradient(70, 70, 45, 90, 90, 88);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.6, 'rgba(0,0,0,0.2)');
    grad.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.beginPath();
    ctx.arc(90, 90, 78, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    angle += 0.006;
    requestAnimationFrame(drawGlobe);
  }
  drawGlobe();
})();

function login() {
  var u = document.getElementById('usernameInput').value.trim();
  var p = document.getElementById('passwordInput').value.trim();
  if (!u || !p) {
    document.getElementById('errorMsg').textContent = 'Please fill all fields';
    return;
  }
  socket.emit('login', { username: u, password: p });
}

socket.on('login-ok', function(data) {
  localStorage.setItem('ibiu_user', data.username);
  window.location.href = '/chat';
});

socket.on('login-error', function(msg) {
  document.getElementById('errorMsg').textContent = msg;
});
</script>
</body>
</html>
