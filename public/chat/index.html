<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IBIU Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif}
body.dark{background:#0a0e14;color:#c9d1d9}
body.light{background:#f5f5f7;color:#111}
#app{display:flex;height:100%}
#sidebar{width:300px;display:flex;flex-direction:column;border-right:1px solid #333}
body.dark #sidebar{background:#0d1117;border-color:#1a1f2b}
body.light #sidebar{background:#fff;border-color:#ddd}
#sidebar h2{padding:16px;font-weight:400;letter-spacing:4px}
body.dark #sidebar h2{color:#fff;border-bottom:1px solid #1a1f2b}
body.light #sidebar h2{color:#000;border-bottom:1px solid #eee}
#sidebar input{margin:10px;padding:10px;border-radius:10px;border:1px solid #333;outline:none}
body.dark #sidebar input{background:#0a0e14;color:#fff;border-color:#1a1f2b}
body.light #sidebar input{background:#fff;color:#000;border-color:#ddd}
.chat-item{padding:12px 16px;cursor:pointer}
body.dark .chat-item{color:#fff;border-bottom:1px solid #1a1f2b}
body.light .chat-item{color:#000;border-bottom:1px solid #eee}
.chat-item:hover{opacity:.7}
#main{flex:1;display:flex;flex-direction:column}
#main-header{padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
body.dark #main-header{background:#0d1117;border-bottom:1px solid #1a1f2b;color:#fff}
body.light #main-header{background:#fff;border-bottom:1px solid #eee;color:#000}
#main-header button{background:none;border:1px solid #888;padding:6px 10px;border-radius:6px;cursor:pointer;margin-left:6px;font-size:11px}
body.dark #main-header button{color:#fff}body.light #main-header button{color:#000}
#messages{flex:1;overflow-y:auto;padding:16px}
.msg{margin-bottom:8px;max-width:70%}
.msg.me{margin-left:auto;text-align:right}
.bubble{display:inline-block;padding:10px 14px;border-radius:16px;font-size:14px}
.msg.me .bubble{background:#1f6feb;color:#fff}
body.light .msg.me .bubble{background:#007aff}
body.dark .msg.other .bubble{background:#1c2333;color:#e5e5ea}
body.light .msg.other .bubble{background:#e9e9ef;color:#000}
.time{font-size:9px;margin-top:2px}body.dark .time{color:#8b949e}body.light .time{color:#888}
.msg img,.msg video{max-width:200px;border-radius:8px;display:block}.msg audio{max-width:180px}
#input-area{display:flex;gap:8px;padding:10px 16px;border-top:1px solid #333}
body.dark #input-area{background:#0d1117;border-color:#1a1f2b}
body.light #input-area{background:#fff;border-color:#eee}
#input-area input[type="text"]{flex:1;padding:10px 16px;border-radius:20px;border:1px solid #555;outline:none}
body.dark #input-area input{background:#0a0e14;color:#fff}
body.light #input-area input{background:#f5f5f7;color:#000}
#input-area button{padding:10px 14px;border-radius:50%;border:none;cursor:pointer;background:#1f6feb;color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:100;justify-content:center;align-items:center}
.modal.show{display:flex}
.modal-box{background:#0d1117;border:1px solid #d4af37;border-radius:16px;padding:24px;width:90%;max-width:360px;text-align:center;color:#fff}
.modal-box h3{color:#d4af37;margin-bottom:12px}
.modal-box input{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #333;background:#0a0e14;color:#fff}
.modal-box button{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;margin:4px;background:#d4af37;color:#000}
</style>
</head>
<body class="dark">
<div id="app">
<div id="sidebar">
<h2>IBIU</h2>
<input type="text" id="searchInput" placeholder="Search..." oninput="search()">
<div id="chat-list"></div>
</div>
<div id="main">
<div id="main-header">
<span id="chatTitle">Select chat</span>
<div>
<button onclick="openModal('profileModal');socket.emit('get-profile')">Profile</button>
<button onclick="openModal('infoModal');socket.emit('get-info')">Info</button>
<button onclick="toggleTheme()">Theme</button>
<button onclick="logout()">Log Out</button>
</div>
</div>
<div id="messages"></div>
<div id="input-area">
<input type="file" id="fileInput" onchange="sendFile()" multiple hidden>
<button onclick="document.getElementById('fileInput').click()">📎</button>
<input type="text" id="msgInput" placeholder="Message..." onkeydown="if(event.key==='Enter')sendMsg()">
<button onclick="sendMsg()">➤</button>
</div>
</div>
</div>
<div class="modal" id="profileModal"><div class="modal-box"><h3>Profile</h3><div id="profilePic"></div><input type="file" id="avatarInput" accept="image/*" onchange="uploadAvatar()"><br><button onclick="closeModal('profileModal')">Close</button></div></div>
<div class="modal" id="infoModal"><div class="modal-box"><h3>Info</h3><p>Username: <b id="infoUser"></b></p><p>Password: <span id="infoPass">••••</span> <button onclick="showPass()">👁️</button></p><br><button onclick="closeModal('infoModal')">Close</button></div></div>
<script src="/socket.io/socket.io.js"></script>
<script>
var socket=io(),myUser=localStorage.getItem('ibiu_user')||'',chatWith=null,isDark=true;
fetch('/api/users').then(r=>r.json()).then(u=>{
var l=document.getElementById('chat-list');l.innerHTML='';
var g=document.createElement('div');g.className='chat-item';g.textContent='#ibiu-news';g.onclick=()=>{chatWith='ibiu-news';document.getElementById('chatTitle').textContent='#ibiu-news';document.getElementById('messages').innerHTML=''};l.appendChild(g);
u.forEach(x=>{if(x===myUser)return;var d=document.createElement('div');d.className='chat-item';d.textContent='@'+x;d.onclick=()=>{chatWith=x;document.getElementById('chatTitle').textContent='@'+x;document.getElementById('messages').innerHTML='';socket.emit('get-pv',{with:x})};l.appendChild(d)})});
function search(){var q=document.getElementById('searchInput').value.trim();if(!q)return;socket.emit('search-user',q)}
socket.on('search-results',r=>{var l=document.getElementById('chat-list');l.innerHTML='';r.forEach(x=>{if(x===myUser)return;var d=document.createElement('div');d.className='chat-item';d.textContent='@'+x;d.onclick=()=>{chatWith=x;document.getElementById('chatTitle').textContent='@'+x;document.getElementById('messages').innerHTML='';socket.emit('get-pv',{with:x})};l.appendChild(d)})});
function sendMsg(){var t=document.getElementById('msgInput').value.trim();if(!t||!chatWith)return;chatWith==='ibiu-news'?socket.emit('group-msg',{text:t}):socket.emit('pv-msg',{to:chatWith,text:t});document.getElementById('msgInput').value=''}
function sendFile(){var f=document.getElementById('fileInput').files[0];if(!f||!chatWith)return;var r=new FileReader();r.onload=e=>socket.emit('pv-file',{to:chatWith,name:f.name,data:e.target.result,mime:f.type});r.readAsArrayBuffer(f)}
socket.on('pv-data',d=>d.messages.forEach(m=>addMsg(m,m.from===myUser)));
socket.on('pv-msg',d=>{if(chatWith&&d.pvKey.includes(chatWith))addMsg(d.msg,d.msg.from===myUser)});
socket.on('group-msg',d=>{if(chatWith==='ibiu-news')addMsg(d.msg,d.msg.from===myUser)});
function addMsg(m,me){var div=document.createElement('div');div.className='msg '+(me?'me':'other');var h='<div class="bubble">';if(m.type==='text')h+=m.text;else if(m.type==='file'){if(m.mime&&m.mime.startsWith('image/'))h+='<img src="'+m.fileUrl+'">';else if(m.mime&&m.mime.startsWith('video/'))h+='<video controls src="'+m.fileUrl+'">';else if(m.mime&&m.mime.startsWith('audio/'))h+='<audio controls src="'+m.fileUrl+'">';else h+='<a href="'+m.fileUrl+'" download style="color:#79c0ff">'+m.fileName+'</a>'}else if(m.type==='voice')h+='<audio controls src="'+m.fileUrl+'">';h+='</div><div class="time">'+new Date(m.time).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false})+'</div>';div.innerHTML=h;document.getElementById('messages').appendChild(div);document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight}
function uploadAvatar(){var f=document.getElementById('avatarInput').files[0];if(!f)return;var r=new FileReader();r.onload=e=>socket.emit('update-avatar',{data:e.target.result});r.readAsArrayBuffer(f)}
socket.on('profile-data',d=>document.getElementById('profilePic').innerHTML=d.avatar?'<img src="'+d.avatar+'" style="width:60px;border-radius:50%">':'No avatar');
socket.on('avatar-updated',url=>document.getElementById('profilePic').innerHTML='<img src="'+url+'" style="width:60px;border-radius:50%">');
socket.on('info-data',d=>{document.getElementById('infoUser').textContent='@'+d.username;document.getElementById('infoPass').textContent='••••';document.getElementById('infoPass').dataset.pw=d.password});
function showPass(){var e=document.getElementById('infoPass');e.textContent=e.textContent==='••••'?e.dataset.pw:'••••'}
function toggleTheme(){isDark=!isDark;document.body.className=isDark?'dark':'light'}
function openModal(id){document.getElementById(id).classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}
function logout(){localStorage.clear();window.location.href='/'}
</script>
</body>
</html>
